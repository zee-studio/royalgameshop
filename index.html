<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Game Shop</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
body{ background:#0c0b1a; color:#fff; padding-top:90px; }
.top-bar{ position:fixed; top:0; left:0; width:100%; height:70px; display:flex; justify-content:space-between; align-items:center; padding:0 16px; background:rgba(255,255,255,0.06); backdrop-filter:blur(12px); border-bottom:1px solid rgba(255,255,255,0.15); z-index:1000; }
.left-box{ display:flex; align-items:center; gap:12px; }
.logo-box img{ height:44px }
.menu-btn{ width:28px; display:flex; flex-direction:column; gap:5px; cursor:pointer; }
.menu-btn span{ height:3px; background:#fff; border-radius:2px; }
.nav-links{ display: flex; align-items: center; }
.nav-links a{ padding:8px 16px; border-radius:14px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.25); color:#fff; font-weight:600; text-decoration:none; margin-left:10px; cursor: pointer; transition: 0.3s; }
.pc-only{ display:none }
.side-menu{ position:fixed; top:0; left:-260px; width:240px; height:100vh; background:#121028; padding:90px 18px; transition:.35s ease; z-index:1100; }
.side-menu a{ display:flex; align-items:center; gap:12px; padding:14px; margin-bottom:12px; border-radius:14px; background:rgba(255,255,255,.08); color:#fff; text-decoration:none; font-weight:600; }
.overlay{ position:fixed; inset:0; background:rgba(0,0,0,.45); opacity:0; pointer-events:none; transition:.3s; z-index:1050; }
.side-menu.active{ left:0 }
.overlay.active{ opacity:1; pointer-events:auto; }
.banner-wrapper{ padding:0 14px }
.banner-slider{ position:relative; width:100%; height:180px; border-radius:20px; overflow:hidden; margin:18px auto; background:#000; }
@media(min-width:768px){ .banner-slider{ height:320px; } .game-grid{ grid-template-columns:repeat(3,1fr); } .menu-btn{ display:none; } .pc-only{ display:flex; } }
@media(min-width:1100px){ main{ max-width:1200px; margin:auto; } .game-grid{ grid-template-columns:repeat(5,1fr); gap:16px; } }
.banner-slider img{ width:100%; height:100%; object-fit:contain; background:#000; position:absolute; inset:0; opacity:0; transition:opacity .7s ease; }
.banner-slider img.active{ opacity:1 }
.dots{ position:absolute; bottom:12px; left:50%; transform:translateX(-50%); display:flex; gap:8px; }
.dots span{ width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,.4); }
.dots span.active{ background:#bb86fc }
main{ padding:20px; text-align:center; }
.center-title{ font-size:26px; color:#d6c1ff; margin-bottom:22px; }
.game-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:18px; }
.game-card{ background:rgba(255,255,255,0.07); border-radius:20px; padding:12px; text-decoration:none; color:#fff; transition:.3s; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.05); }
.game-card:hover{ transform:translateY(-6px); border-color: rgba(187, 134, 252, 0.4); }
.game-card a { text-decoration: none; color: #fff; width: 100%; text-align: center; }
.game-card img{ width:100%; aspect-ratio:1/1; object-fit:cover; border-radius:14px; margin-bottom:10px; background: rgba(0,0,0,0.2); }
.game-card span { font-size: 14px; font-weight: bold; display: block; margin-top: 5px; color: #e1d5ff; }
</style>
</head>
<body>

<div class="top-bar">
  <div class="left-box">
    <div class="menu-btn" onclick="toggleMenu()"><span></span><span></span><span></span></div>
    <div class="logo-box"><img src="https://i.ibb.co/pBCj40vb/Untitled33-20250505002056.png"></div>
  </div>
  <div class="nav-links">
    <div class="pc-only" style="display: contents;">
      <a href="about.html">About</a>
      <a href="promo.html">Promo</a>
    </div>
  </div>
</div>

<div class="side-menu" id="sideMenu">
  <a href="about.html">About</a>
  <a href="promo.html">Promo</a>
  <a href="https://www.facebook.com/share/1DVMKr6vKX/?mibextid=wwXIfr" target="_blank">Facebook Page</a>
  <a href="www.tiktok.com/@royalgameshopmm" target="_blank">TikTok</a>
  <a href="https://t.me/royalgameshoptgmm" target="_blank">Telegram</a>
</div>
<div class="overlay" onclick="toggleMenu()"></div>

<div class="banner-wrapper">
  <div class="banner-slider"><div class="dots"></div></div>
</div>

<main>
  <h2 class="center-title">Choose Game</h2>
  <div class="game-grid" id="gameGrid">
    <p style="font-size:14px; color:rgba(255,255,255,0.4); grid-column: 1/-1; padding: 20px;">ဂိမ်းအမျိုးအစားများ ဆွဲတင်နေသည်...</p>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
let index=0,timer=null;
function toggleMenu(){ document.getElementById("sideMenu").classList.toggle("active"); document.querySelector(".overlay").classList.toggle("active"); }

function initSliderAnimation() {
  const imgs = document.querySelectorAll(".banner-slider img"); const dots = document.querySelectorAll(".dots span");
  if(imgs.length === 0) return; clearInterval(timer); index = 0;
  imgs.forEach((img, i) => { if(i===0) img.classList.add("active"); else img.classList.remove("active"); });
  dots.forEach((dot, i) => { if(i===0) dot.classList.add("active"); else dot.classList.remove("active"); });
  if(imgs.length > 1) {
    timer = setInterval(() => {
      imgs[index].classList.remove("active"); dots[index].classList.remove("active");
      index = (index + 1) % imgs.length;
      imgs[index].classList.add("active"); dots[index].classList.add("active");
    }, 3500);
  }
}

// Supabase ချိတ်ဆက်မှု
const SUPABASE_URL = "https://cmiiovretkzjuiespsmx.supabase.co";
const SUPABASE_KEY = "sb_publishable_ctGYJqLMn0s6MwNx3qIvRw_V5VG-Y3pzeEpCek80X2REbHh1N0pCdzA5TmhKUXh2WVZoTQ==";
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Traffic views မြှင့်တင်ခြင်း
async function updateAnalytics() {
  if(!sessionStorage.getItem('counted')) {
    const { data } = await supabase.from('site_analytics').select('views').eq('id', 1).single();
    let currentViews = (data ? data.views : 0) + 1;
    await supabase.from('site_analytics').upsert({ id: 1, views: currentViews });
    sessionStorage.setItem('counted', 'true');
  }
}
updateAnalytics();

// Load Banners
async function loadBanners() {
  const { data: banners } = await supabase.from('banners').select('*').order('created_at', { ascending: true });
  const slider = document.querySelector(".banner-slider"); const dots = document.querySelector(".dots");
  if(!slider || !banners) return;
  slider.querySelectorAll("img").forEach(i => i.remove()); dots.innerHTML = "";
  banners.forEach((b) => {
    const img = document.createElement("img"); img.src = b.image; slider.appendChild(img);
    const dot = document.createElement("span"); dots.appendChild(dot);
  });
  initSliderAnimation();
}
loadBanners();

// Load Categories
async function loadCategories() {
  const grid = document.getElementById("gameGrid");
  if(!grid) return;
  const { data: categories, error } = await supabase.from('categories').select('*').order('created_at', { ascending: true });
  
  if(error || !categories || categories.length === 0) {
    grid.innerHTML = `<p style="font-size:14px; color:rgba(255,255,255,0.4); grid-column: 1/-1; padding:20px;">တင်ထားသော ဂိမ်းအမျိုးအစားမရှိသေးပါ။</p>`;
    return;
  }

  grid.innerHTML = "";
  categories.forEach((c) => {
    grid.innerHTML += `
      <div class="game-card">
        <a href="products.html?cat=${c.id}">
          <img src="${c.image}" alt="${c.name}">
          <span>${c.name}</span>
        </a>
      </div>`;
  });
}
loadCategories();
</script>
</body>
</html>
