<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Game Shop - Premium Gaming Store 👑</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  --bg-dark: #090814;
  --panel-bg: rgba(20, 18, 42, 0.6);
  --primary: #bb86fc;
  --accent: #03dac6;
  --text-main: #ffffff;
  --border: rgba(255, 255, 255, 0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
body { background: var(--bg-dark); color: var(--text-main); min-height: 100vh; padding-bottom: 60px; }

/* 🌟 Navbar Navigation */
.header-nav { display: flex; justify-content: space-between; align-items: center; padding: 18px 24px; background: rgba(15, 13, 34, 0.8); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
.header-nav h1 { font-size: 20px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
.header-nav h1 span { color: var(--primary); text-shadow: 0 0 10px rgba(187,134,252,0.3); }
.btn-login { background: linear-gradient(135deg, #bb86fc, #985eff); color: #0c0b1a; padding: 8px 20px; border-radius: 10px; font-weight: bold; text-decoration: none; font-size: 14px; transition: 0.2s; }
.btn-login:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(187,134,252,0.4); }

/* 🖼️ Premium Responsive Banner Slider Container */
.main-wrapper { max-width: 1200px; width: 100%; margin: 20px auto; padding: 0 15px; }

.banner-slider-box {
  width: 100%;
  position: relative;
  overflow: hidden;
  border-radius: 16px;
  border: 1px solid var(--border);
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
  background: #000000;
  /* 💡 ၁၆:၆ အချိုးအတိုင်း မပြတ်ဘဲ ဖုန်းရော PC မှာပါ အလိုအလျောက် ပုံစံကျကျ ကြီးလာ/သေးလာစေရန် */
  aspect-ratio: 16 / 6; 
}

/* Slide များကို တစ်ခုစီ ပတ်လည်ရွေ့လျားစေမည့် Track */
.slider-track {
  display: flex;
  width: 100%;
  height: 100%;
  transition: transform 0.5s ease-in-out;
}

.slide-item {
  min-width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
}

.slide-item img {
  width: 100%;
  height: 100%;
  /* 💡 ပုံရဲ့ ဘေးအနားသတ်တွေကို လုံးဝမပြတ်ဘဲ တစ်ပုံလုံး အပြည့်အဝ ပေါ်နေစေရန် ကော်မန်ပေးခြင်း */
  object-fit: contain; 
  display: block;
}

/* Slider Dropdown Dots Indicator */
.slider-dots {
  position: absolute;
  bottom: 15px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 8px;
  z-index: 10;
}

.slider-dots span {
  width: 8px;
  height: 8px;
  background: rgba(255, 255, 255, 0.35);
  border-radius: 50%;
  cursor: pointer;
  transition: 0.3s;
}

.slider-dots span.active {
  background: var(--primary);
  width: 22px;
  border-radius: 5px;
  box-shadow: 0 0 8px var(--primary);
}

/* 🎲 Game Categories Section UI */
.section-title { font-size: 20px; font-weight: 700; margin: 35px 0 20px 0; display: flex; align-items: center; gap: 10px; border-left: 4px solid var(--primary); padding-left: 10px; }

.games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; }
@media (min-width: 576px) { .games-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); } }

.game-card { background: var(--panel-bg); border: 1px solid var(--border); border-radius: 18px; padding: 12px; text-align: center; text-decoration: none; color: #fff; transition: 0.2s; display: flex; flex-direction: column; gap: 10px; box-shadow: 0 6px 15px rgba(0,0,0,0.15); }
.game-card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 8px 25px rgba(187,134,252,0.25); }

.game-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 14px; background: #14122a; }
.game-card span { font-weight: 700; font-size: 14px; color: #e1d5ff; padding: 4px 0; }
</style>
</head>
<body>

<div class="header-nav">
  <h1><span>Royal Game Shop</span> Store 👑</h1>
  <a href="login.html" class="btn-login" id="navAuthBtn"><i class="fa-solid fa-user"></i> Login</a>
</div>

<div class="main-wrapper">

  <div class="banner-slider-box">
    <div class="slider-track" id="bannerSliderTrack">
      <div class="slide-item"><p style="padding: 50px; color: rgba(255,255,255,0.4);">Banners Loading...</p></div>
    </div>
    <div class="slider-dots" id="sliderDotsContainer"></div>
  </div>

  <h2 class="section-title">🎲 Choose Game Category</h2>
  <div class="games-grid" id="homepageGamesGrid">
    <p style="color: rgba(255,255,255,0.4);">ဂိမ်းအမျိုးအစားများ ဆွဲတင်နေပါသည်...</p>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://cmiiovretkzjuiespsmx.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtaWlvdnJldGt6anVpZXNwc214Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NTkzNzYsImV4cCI6MjA5NzMzNTM3Nn0.7JpD4erEqpGCBgQ9TktAWhFSbapQMwvV4WzFLP0fWmA";
const royalSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentSlideIndex = 0;
let slideInterval;

async function initHomepage() {
  checkUserSession();
  await loadBanners();
  await loadCategories();
}

// 🔐 လူကြီးမင်းတို့ရဲ့ အကောင့် Login အခြေအနေ စစ်ဆေးခြင်း
async function checkUserSession() {
  const { data: { session } } = await royalSupabase.auth.getSession();
  const authBtn = document.getElementById("navAuthBtn");
  if (session) {
    authBtn.innerHTML = `<i class="fa-solid fa-right-from-bracket"></i> Logout`;
    authBtn.href = "javascript:void(0)";
    authBtn.addEventListener('click', async () => {
      await royalSupabase.auth.signOut();
      window.location.reload();
    });
  }
}

// 🖼️ Supabase 'banners' ထဲမှ ပုံများကို အမှားအယွင်းမရှိ ဆွဲထုတ်ပြီး အချိုးကျ ဆလိုက်လှုပ်ရှားစေခြင်း စနစ်သစ်
async function loadBanners() {
  const { data: banners, error } = await royalSupabase.from('banners').select('*').order('created_at', { ascending: true });
  const track = document.getElementById("bannerSliderTrack");
  const dotsContainer = document.getElementById("sliderDotsContainer");
  
  if (error || !banners || banners.length === 0) {
    // အကယ်၍ ဒေတာဘေ့စ်ထဲမှာ ဘာမှမရှိသေးရင် Default ပုံတစ်ခု ပြသထားပေးမည်
    track.innerHTML = `<div class="slide-item"><img src="https://www.pubgmobile.com/images/event/home/kv17.jpg"></div>`;
    return;
  }

  track.innerHTML = "";
  dotsContainer.innerHTML = "";

  banners.forEach((b, index) => {
    // Slide တစ်ခုချင်းစီ ဖန်တီးခြင်း
    const slide = document.createElement("div");
    slide.className = "slide-item";
    
    const img = document.createElement("img");
    img.src = b.image;
    img.onerror = () => { img.src = "https://www.pubgmobile.com/images/event/home/kv17.jpg"; }; // လင့်ခ်အမှားပါက PUBG ပုံဖြင့် အစားထိုးရန်
    
    slide.appendChild(img);
    track.appendChild(slide);

    // Indicator Dot စက်ဝိုင်းလေးများ ဖန်တီးခြင်း
    const dot = document.createElement("span");
    if (index === 0) dot.className = "active";
    dot.addEventListener("click", () => goToSlide(index));
    dotsContainer.appendChild(dot);
  });

  // ဆလိုက် လှုပ်ရှားမှု စတင်မောင်းနှင်ခြင်း
  startSliderAutoPlay(banners.length);
}

function goToSlide(index) {
  const track = document.getElementById("bannerSliderTrack");
  const dots = document.querySelectorAll(".slider-dots span");
  currentSlideIndex = index;
  
  track.style.transform = `translateX(-${index * 100}%)`;
  
  dots.forEach(dot => dot.classList.remove("active"));
  if (dots[index]) dots[index].classList.add("active");
}

function startSliderAutoPlay(totalSlides) {
  if(slideInterval) clearInterval(slideInterval);
  if(totalSlides <= 1) return; // Banner တစ်ခုတည်းရှိလျှင် အလိုအလျောက် မရွေ့စေရန်
  
  slideInterval = setInterval(() => {
    currentSlideIndex = (currentSlideIndex + 1) % totalSlides;
    goToSlide(currentSlideIndex);
  }, 4000); // ၄ စက္ကန့်လျှင် တစ်ကြိမ် အလိုအလျောက် Slide ပြောင်းပေးမည်
}

// 🎲 Supabase 'categories' ထဲမှ ဂိမ်းစာရင်းများကို ဆွဲတင်ပြသခြင်း
async function loadCategories() {
  const { data: categories, error } = await royalSupabase.from('categories').select('*').order('created_at', { ascending: true });
  const grid = document.getElementById("homepageGamesGrid");
  
  if (error || !categories || categories.length === 0) {
    grid.innerHTML = `<p style="color: rgba(255,255,255,0.4); grid-column: 1/-1; text-align:center;">လက်ရှိတွင် ရောင်းချမည့်ဂိမ်းများ မရှိသေးပါဗျာ။</p>`;
    return;
  }

  grid.innerHTML = "";
  categories.forEach(c => {
    grid.innerHTML += `
      <a href="products.html?cat=${c.id}&name=${encodeURIComponent(c.name)}" class="game-card">
        <img src="${c.image}" alt="${c.name}">
        <span>${c.name}</span>
      </a>`;
  });
}

window.onload = initHomepage;
</script>
</body>
</html>
