<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Game Shop</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#0c0b1a;
  color:#fff;
  padding-top:90px;
}

/* ===== TOP BAR ===== */
.top-bar{
  position:fixed;
  top:0;left:0;
  width:100%;
  height:70px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 16px;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.15);
  z-index:1000;
}

.left-box{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo-box img{height:44px}

/* ===== HAMBURGER ===== */
.menu-btn{
  width:28px;
  display:flex;
  flex-direction:column;
  gap:5px;
  cursor:pointer;
}
.menu-btn span{
  height:3px;
  background:#fff;
  border-radius:2px;
}

/* ===== NAV (PC & RIGHT SIDE) ===== */
.nav-links{
  display: flex;
  align-items: center;
}
.nav-links a, .login-trigger-btn{
  padding:8px 16px;
  border-radius:14px;
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.25);
  color:#fff;
  font-weight:600;
  text-decoration:none;
  margin-left:10px;
  cursor: pointer;
  transition: 0.3s;
}
.login-trigger-btn{
  background: #bb86fc;
  color: #0c0b1a;
  border-color: #bb86fc;
}
.login-trigger-btn:hover{
  background: #d6c1ff;
}
.pc-only{display:none}

/* ===== SIDE MENU ===== */
.side-menu{
  position:fixed;
  top:0;
  left:-260px;
  width:240px;
  height:100vh;
  background:#121028;
  padding:90px 18px;
  transition:.35s ease;
  z-index:1100;
}
.side-menu a{
  display:flex;
  align-items:center;
  gap:12px;
  padding:14px;
  margin-bottom:12px;
  border-radius:14px;
  background:rgba(255,255,255,.08);
  color:#fff;
  text-decoration:none;
  font-weight:600;
}
.side-menu a:hover{background:rgba(255,255,255,.15)}

/* ===== OVERLAY ===== */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  opacity:0;
  pointer-events:none;
  transition:.3s;
  z-index:1050;
}
.side-menu.active{left:0}
.overlay.active{
  opacity:1;
  pointer-events:auto;
}

/* ===== BANNER ===== */
.banner-wrapper{padding:0 14px}
.banner-slider{
  position:relative;
  width:100%;
  height:180px;
  border-radius:20px;
  overflow:hidden;
  margin:18px auto;
  background:#000;
}
@media(min-width:768px){
  .banner-slider{height:320px}
}
.banner-slider img{
  width:100%;
  height:100%;
  object-fit:contain;
  background:#000;
  position:absolute;
  inset:0;
  opacity:0;
  transition:opacity .7s ease;
}
.banner-slider img.active{opacity:1}

/* ===== DOTS ===== */
.dots{
  position:absolute;
  bottom:12px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:8px;
}
.dots span{
  width:8px;height:8px;
  border-radius:50%;
  background:rgba(255,255,255,.4);
}
.dots span.active{background:#bb86fc}

/* ===== MAIN ===== */
main{
  padding:20px;
  text-align:center;
}

.center-title{
  font-size:26px;
  color:#d6c1ff;
  margin-bottom:22px;
}

.game-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:18px;
}

.game-card{
  background:rgba(255,255,255,0.07);
  border-radius:20px;
  padding:12px;
  text-decoration:none;
  color:#fff;
  transition:.3s;
}
.game-card:hover{transform:translateY(-6px)}
.game-card img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  border-radius:14px;
  margin-bottom:10px;
}

/* ===== AUTH & PROFILE MODAL ===== */
.auth-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(8px);
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  pointer-events: none;
  transition: 0.3s ease;
  z-index: 2000;
  padding: 20px;
}
.auth-overlay.active {
  opacity: 1;
  pointer-events: auto;
}
.auth-card {
  width: 100%;
  max-width: 380px;
  background: rgba(20, 18, 42, 0.9);
  border: 1px solid rgba(255, 255, 255, 0.15);
  border-radius: 24px;
  padding: 25px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  position: relative;
}
.close-auth {
  position: absolute;
  top: 15px; right: 20px;
  font-size: 20px;
  cursor: pointer;
  color: rgba(255,255,255,0.6);
}
.auth-card h2 {
  font-size: 24px;
  text-align: center;
  margin-bottom: 20px;
  color: #d6c1ff;
}
.input-box {
  position: relative;
  margin-bottom: 15px;
}
.input-box i {
  position: absolute;
  left: 15px; top: 50%;
  transform: translateY(-50%);
  color: #bb86fc;
}
.input-box input {
  width: 100%;
  padding: 12px 15px 12px 42px;
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 12px;
  color: #fff;
  outline: none;
}
.input-box input:focus {
  border-color: #bb86fc;
}
.auth-btn {
  width: 100%;
  padding: 12px;
  background: #bb86fc;
  border: none;
  border-radius: 12px;
  color: #0c0b1a;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 10px;
}
.logout-btn {
  background: #ff4f4f;
  color: #fff;
}
.switch-form {
  text-align: center;
  margin-top: 15px;
  font-size: 13px;
  color: rgba(255,255,255,0.6);
}
.switch-form a {
  color: #bb86fc;
  text-decoration: none;
  font-weight: 600;
}
.hidden { display: none; }

/* ===== PROFILE STYLES ===== */
.profile-info {
  text-align: center;
  padding: 15px 0;
}
.profile-avatar {
  font-size: 50px;
  color: #bb86fc;
  margin-bottom: 10px;
}
.user-email {
  font-size: 16px;
  color: #fff;
  word-break: break-all;
  background: rgba(255,255,255,0.05);
  padding: 10px;
  border-radius: 10px;
  margin-top: 5px;
}

/* ===== TABLET ===== */
@media(min-width:768px){
  .game-grid{grid-template-columns:repeat(3,1fr)}
  .menu-btn{display:none}
  .pc-only{display:flex}
}

/* ===== PC SIZE FIX ===== */
@media(min-width:1100px){
  main{
    max-width:1200px;
    margin:auto;
  }
  .game-grid{
    grid-template-columns:repeat(5,1fr);
    gap:16px;
  }
  .game-card{padding:10px}
}
</style>
</head>

<body>

<div class="top-bar">
  <div class="left-box">
    <div class="menu-btn" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </div>
    <div class="logo-box">
      <img src="https://i.ibb.co/pBCj40vb/Untitled33-20250505002056.png">
    </div>
  </div>

  <div class="nav-links">
    <div class="pc-only" style="display: contents;">
      <a href="about.html" class="pc-only">About</a>
      <a href="promo.html" class="pc-only">Promo</a>
    </div>
    <span class="login-trigger-btn" id="userStatusBtn" onclick="openAuthModal()">Login</span>
  </div>
</div>

<div class="side-menu" id="sideMenu">
  <a href="about.html">About</a>
  <a href="promo.html">Promo</a>
  <a href="javascript:void(0)" onclick="toggleMenu(); openAuthModal();" id="mobileLoginBtn">Login / Register</a>
  <a href="https://www.facebook.com/share/1DVMKr6vKX/?mibextid=wwXIfr" target="_blank">Facebook Page</a>
  <a href="www.tiktok.com/@royalgameshopmm" target="_blank">TikTok</a>
  <a href="https://t.me/royalgameshoptgmm" target="_blank">Telegram</a>
</div>
<div class="overlay" onclick="toggleMenu()"></div>

<div class="banner-wrapper">
  <div class="banner-slider">
    <div class="dots"></div>
  </div>
</div>

<main>
  <h2 class="center-title">Choose Game</h2>
  <div class="game-grid"></div>
</main>


<div class="auth-overlay" id="authModal">
  <div class="auth-card hidden" id="loginCard">
    <span class="close-auth" onclick="closeAuthModal()">&times;</span>
    <h2>Login</h2>
    <div class="input-box">
      <i class="fa-solid fa-envelope"></i>
      <input type="email" id="loginEmail" placeholder="Email Address">
    </div>
    <div class="input-box">
      <i class="fa-solid fa-lock"></i>
      <input type="password" id="loginPassword" placeholder="Password">
    </div>
    <button class="auth-btn" id="btnLogin">Sign In</button>
    <p class="switch-form">အကောင့်မရှိသေးဘူးလား? <a href="javascript:void(0)" onclick="toggleAuthForm()">Register လုပ်ရန်</a></p>
  </div>

  <div class="auth-card hidden" id="registerCard">
    <span class="close-auth" onclick="closeAuthModal()">&times;</span>
    <h2>Register</h2>
    <div class="input-box">
      <i class="fa-solid fa-envelope"></i>
      <input type="email" id="regEmail" placeholder="Email Address">
    </div>
    <div class="input-box">
      <i class="fa-solid fa-lock"></i>
      <input type="password" id="regPassword" placeholder="Password (အနည်းဆုံး ၆ လုံး)">
    </div>
    <button class="auth-btn" id="btnRegister">Create Account</button>
    <p class="switch-form">အကောင့်ရှိပြီးသားလား? <a href="javascript:void(0)" onclick="toggleAuthForm()">Login ဝင်ရန်</a></p>
  </div>

  <div class="auth-card hidden" id="profileCard">
    <span class="close-auth" onclick="closeAuthModal()">&times;</span>
    <h2>My Profile</h2>
    <div class="profile-info">
      <div class="profile-avatar"><i class="fa-solid fa-circle-user"></i></div>
      <p style="color: rgba(255,255,255,0.6); font-size: 13px;">Logged in as</p>
      <p class="user-email" id="profileEmail">user@example.com</p>
    </div>
    <button class="auth-btn logout-btn" id="btnLogout">Logout</button>
  </div>
</div>


<script>
const BANNER_SHEET =
"https://opensheet.elk.sh/1TrqwnYbOqSF9ugfFfbKIPMnHPeWuuNbPBhbIUFFwAI4/banners";
const CATEGORY_SHEET =
"https://opensheet.elk.sh/1TrqwnYbOqSF9ugfFfbKIPMnHPeWuuNbPBhbIUFFwAI4/categories";

let index=0,timer=null,startX=0;
let isLoggedIn = false; 

function toggleMenu(){
  document.getElementById("sideMenu").classList.toggle("active");
  document.querySelector(".overlay").classList.toggle("active");
}

/* ===== MODAL FUNCTIONS ===== */
function openAuthModal() {
  const modal = document.getElementById('authModal');
  const loginCard = document.getElementById('loginCard');
  const registerCard = document.getElementById('registerCard');
  const profileCard = document.getElementById('profileCard');

  modal.classList.add('active');

  if (isLoggedIn) {
    profileCard.classList.remove('hidden');
    loginCard.classList.add('hidden');
    registerCard.classList.add('hidden');
  } else {
    loginCard.classList.remove('hidden');
    registerCard.classList.add('hidden');
    profileCard.classList.add('hidden');
  }
}

function closeAuthModal() {
  document.getElementById('authModal').classList.remove('active');
}

function toggleAuthForm() {
  document.getElementById('loginCard').classList.toggle('hidden');
  document.getElementById('registerCard').classList.toggle('hidden');
}

/* ===== LOAD BANNERS ===== */
async function loadBanners(){
  const slider=document.querySelector(".banner-slider");
  const dots=document.querySelector(".dots");
  const res=await fetch(BANNER_SHEET);
  const data=(await res.json()).filter(b=>b.active==="yes");

  slider.querySelectorAll("img").forEach(i=>i.remove());
  dots.innerHTML="";

  data.forEach((b,i)=>{
    const img=document.createElement("img");
    img.src=b.image;
    if(i===0) img.classList.add("active");
    slider.appendChild(img);

    const dot=document.createElement("span");
    if(i===0) dot.classList.add("active");
    dots.appendChild(dot);
  });

  autoPlay();
  swipe(slider);
}

function showSlide(i){
  const imgs=document.querySelectorAll(".banner-slider img");
  const dots=document.querySelectorAll(".dots span");
  if(imgs.length === 0) return;
  imgs.forEach(x=>x.classList.remove("active"));
  dots.forEach(x=>x.classList.remove("active"));
  imgs[i].classList.add("active");
  dots[i].classList.add("active");
}

function autoPlay(){
  clearInterval(timer);
  const total=document.querySelectorAll(".banner-slider img").length;
  if(total<=1) return;
  timer=setInterval(()=>{
    index=(index+1)%total;
    showSlide(index);
  },3500);
}

function swipe(el){
  el.addEventListener("touchstart",e=>{
    startX=e.touches[0].clientX;
    clearInterval(timer);
  });
  el.addEventListener("touchend",e=>{
    const diff=e.changedTouches[0].clientX-startX;
    const total=document.querySelectorAll(".banner-slider img").length;
    if(total<=1) return;
    if(diff>50) index=(index-1+total)%total;
    if(diff<-50) index=(index+1)%total;
    showSlide(index);
    autoPlay();
  });
}

/* ===== LOAD CATEGORIES ===== */
async function loadCategories(){
  const grid=document.querySelector(".game-grid");
  const res=await fetch(CATEGORY_SHEET);
  const data=await res.json();
  grid.innerHTML="";
  data.forEach(c=>{
    if(c.active!=="yes") return;
    grid.innerHTML+=`
      <a href="products.html?cat=${c.id}" class="game-card">
        <img src="${c.image}">
        <span>${c.name}</span>
      </a>`;
  });
}

window.onload=()=>{
  loadBanners();
  loadCategories();
};
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  // သင့်ရဲ့ Google Cloud API Key အသစ်ဖြင့် ချိတ်ဆက်ထားသော Firebase Config
  const firebaseConfig = {
    apiKey: "AIzaSyDNLBZM6kHuoQ4ZY-dP-6MeLNr1ZIwlmq4",
    authDomain: "royal-game-shop-1089f.firebaseapp.com",
    databaseURL: "https://royal-game-shop-1089f-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "royal-game-shop-1089f",
    storageBucket: "royal-game-shop-1089f.firebasestorage.app",
    messagingSenderId: "1050007150235",
    appId: "1:1050007150235:web:f6e1a97f5012cd2ffe303e",
    measurementId: "G-WRMHG3DPXQ"
  };

  // Firebase Init
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // Monitor User State (Login ဝင်ထားမှုကို စောင့်ကြည့်စစ်ဆေးခြင်း)
  onAuthStateChanged(auth, (user) => {
    const statusBtn = document.getElementById('userStatusBtn');
    const mobileBtn = document.getElementById('mobileLoginBtn');
    const profileEmail = document.getElementById('profileEmail');
    
    if (user) {
      isLoggedIn = true;
      profileEmail.innerText = user.email;
      
      statusBtn.innerText = "Profile";
      statusBtn.style.background = "#00cc66"; 
      statusBtn.style.color = "#fff";

      if(mobileBtn) {
        mobileBtn.innerText = "My Profile";
      }
    } else {
      isLoggedIn = false;
      
      statusBtn.innerText = "Login";
      statusBtn.style.background = "#bb86fc";
      statusBtn.style.color = "#0c0b1a";

      if(mobileBtn) {
        mobileBtn.innerText = "Login / Register";
      }
    }
  });

  // REGISTER LOGIC
  document.getElementById('btnRegister').addEventListener('click', async () => {
    const email = document.getElementById('regEmail').value;
    const password = document.getElementById('regPassword').value;

    if(!email || !password) return alert("အချက်အလက်များ ဖြည့်စွက်ပါ");

    try {
      await createUserWithEmailAndPassword(auth, email, password);
      alert("အကောင့်ဖွင့်ခြင်း အောင်မြင်ပါသည်။");
      closeAuthModal();
    } catch (error) {
      alert("Error: " + error.message);
    }
  });

  // LOGIN LOGIC
  document.getElementById('btnLogin').addEventListener('click', async () => {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;

    if(!email || !password) return alert("Email နှင့် Password ဖြည့်ပါ");

    try {
      await signInWithEmailAndPassword(auth, email, password);
      alert("Login အောင်မြင်ပါသည်။");
      closeAuthModal();
    } catch (error) {
      alert("Email သို့မဟုတ် Password မှားယွင်းနေပါသည်။");
    }
  });

  // LOGOUT LOGIC
  document.getElementById('btnLogout').addEventListener('click', async () => {
    try {
      await signOut(auth);
      alert("Logout အောင်မြင်ပါသည်");
      closeAuthModal();
    } catch (error) {
      alert("Error: " + error.message);
    }
  });
</script>

</body>
</html>
