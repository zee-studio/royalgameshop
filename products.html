<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Game Shop - Products</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#0c0b1a;
  color:#fff;
  padding-top:90px;
}

/* ===== TOP BAR ===== */
.top-bar{
  position:fixed;
  top:0;left:0;
  width:100%;
  height:70px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 16px;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.15);
  z-index:1000;
}

.left-box{
  display:flex;
  align-items:center;
  gap:12px;
}
.logo-box img{height:44px}

.nav-links{
  display: flex;
  align-items: center;
}
.nav-links a, .login-trigger-btn{
  padding:8px 16px;
  border-radius:14px;
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.25);
  color:#fff;
  font-weight:600;
  text-decoration:none;
  margin-left:10px;
  cursor: pointer;
}

main{
  padding:20px;
  max-width:800px;
  margin:auto;
}

.game-header {
  text-align: center;
  margin-bottom: 30px;
}
.game-header h2 {
  font-size: 28px;
  color: #d6c1ff;
  margin-top: 10px;
}

/* ===== PRODUCT ITEMS LIST ===== */
.product-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.product-item {
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 16px;
  padding: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: 0.3s;
}
.product-item:hover {
  border-color: #bb86fc;
  background: rgba(255, 255, 255, 0.09);
}
.product-info h4 {
  font-size: 16px;
  color: #fff;
}
.product-info p {
  font-size: 14px;
  color: #bb86fc;
  font-weight: bold;
  margin-top: 4px;
}
.buy-btn {
  padding: 10px 20px;
  background: #bb86fc;
  color: #0c0b1a;
  border: none;
  border-radius: 12px;
  font-weight: bold;
  text-decoration: none;
  cursor: pointer;
  transition: 0.3s;
}
.buy-btn:hover { background: #d6c1ff; }

/* ===== ADMIN CONTROL PANEL (ဂိမ်းပစ္စည်းထည့်ရန်) ===== */
.admin-panel {
  background: rgba(187, 134, 252, 0.05);
  border: 1px dashed #bb86fc;
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 30px;
}
.admin-panel h3 {
  color: #bb86fc;
  margin-bottom: 15px;
  font-size: 18px;
}
.admin-input {
  width: 100%;
  padding: 12px;
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.1);
  color: #fff;
  border-radius: 10px;
  margin-bottom: 12px;
  outline: none;
}
.admin-input:focus { border-color: #bb86fc; }
.btn-delete {
  background: #ff4f4f;
  color: white;
  border: none;
  padding: 6px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 12px;
  margin-left: 10px;
}
.hidden { display: none !important; }
</style>
</head>
<body>

<div class="top-bar">
  <div class="left-box">
    <a href="index.html" style="color:white; font-size:20px; text-decoration:none; margin-right:10px;"><i class="fa-solid fa-arrow-left"></i></a>
    <div class="logo-box"><img src="https://i.ibb.co/pBCj40vb/Untitled33-20250505002056.png"></div>
  </div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <span class="login-trigger-btn" id="userStatusBtn">Loading...</span>
  </div>
</div>

<main>
  <div class="admin-panel hidden" id="adminPanel">
    <h3>+ ပစ္စည်းနှင့် စျေးနှုန်းအသစ်ထည့်ရန် (Admin Only)</h3>
    <input type="text" id="prodName" class="admin-input" placeholder="ပစ္စည်းနာမည် (ဥပမာ - 315 Diamonds သို့မဟုတ် 60 UC)">
    <input type="number" id="prodPrice" class="admin-input" placeholder="စျေးနှုန်း (Ks သာ ဂဏန်းသီးသန့်ထည့်ပါ - ဥပမာ 8500)">
    <button class="buy-btn" id="btnAddProduct" style="width:100%;">ပစ္စည်းသိမ်းမည်</button>
  </div>

  <div class="game-header">
    <h2 id="gameTitle">Loading Game...</h2>
  </div>

  <div class="product-list" id="productContainer">
    </div>
</main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDNLBZM6kHuoQ4ZY-dP-6MeLNr1ZIwlmq4",
    authDomain: "royal-game-shop-1089f.firebaseapp.com",
    databaseURL: "https://royal-game-shop-1089f-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "royal-game-shop-1089f",
    storageBucket: "royal-game-shop-1089f.firebasestorage.app",
    messagingSenderId: "1050007150235",
    appId: "1:1050007150235:web:f6e1a97f5012cd2ffe303e",
    measurementId: "G-WRMHG3DPXQ"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  // URL ကနေ Game ID (?cat=-Kxxxxxx) ကို ဆွဲထုတ်ခြင်း
  const urlParams = new URLSearchParams(window.location.search);
  const gameId = urlParams.get('cat');

  if(!gameId) {
    alert("ဂိမ်းအမျိုးအစား ရွေးချယ်မှု မှားယွင်းနေပါသည်။");
    window.location.href = "index.html";
  }

  let isAdmin = false;

  // 1. MONITOR USER STATE
  onAuthStateChanged(auth, (user) => {
    const statusBtn = document.getElementById('userStatusBtn');
    if (user) {
      statusBtn.innerText = user.email === "royaladmin@gmail.com" ? "Admin 👑" : "Profile";
      if(user.email === "royaladmin@gmail.com") {
        isAdmin = true;
        document.getElementById('adminPanel').classList.remove('hidden'); // Admin ဆိုရင် ပစ္စည်းထည့်တဲ့ Panel ဖွင့်ပေးမယ်
      }
    } else {
      statusBtn.innerText = "Login";
    }
    loadGameDetails();
    loadProducts();
  });

  // 2. ဂိမ်းနာမည်ကို ဆွဲထုတ်ပြသခြင်း
  function loadGameDetails() {
    onValue(ref(db, `categories/${gameId}`), (snapshot) => {
      const game = snapshot.val();
      if(game) {
        document.getElementById('gameTitle').innerText = game.name;
      }
    });
  }

  // 3. ၎င်းဂိမ်းအောက်ရှိ ပစ္စည်းများနှင့် စျေးနှုန်းများကို ဆွဲထုတ်ပြသခြင်း
  function loadProducts() {
    onValue(ref(db, `products/${gameId}`), (snapshot) => {
      const container = document.getElementById('productContainer');
      container.innerHTML = "";
      
      let hasProducts = false;
      snapshot.forEach((child) => {
        hasProducts = true;
        const key = child.key;
        const p = child.val();
        
        container.innerHTML += `
          <div class="product-item">
            <div class="product-info">
              <h4>${p.name}</h4>
              <p>${parseInt(p.price).toLocaleString()} Ks</p>
            </div>
            <div style="display:flex; align-items:center;">
              <a href="checkout.html?cat=${gameId}&prod=${key}" class="buy-btn">ဝယ်မည်</a>
              ${isAdmin ? `<button class="btn-delete" data-id="${key}"><i class="fa-solid fa-trash"></i> ဖျက်မည်</button>` : ''}
            </div>
          </div>`;
      });

      if(!hasProducts) {
        container.innerHTML = `<p style="text-align:center; color:rgba(255,255,255,0.4); font-size:14px;">လောလောဆယ် ရောင်းရန်ပစ္စည်းမရှိသေးပါ။</p>`;
      }

      // Admin အတွက် ပစ္စည်းပြန်ဖျက်သည့်စနစ် ချိတ်ဆက်ခြင်း
      document.querySelectorAll('.btn-delete').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const prodId = e.target.closest('button').dataset.id;
          if(confirm("ဤပစ္စည်းကို ဖျက်ပစ်ရန် သေချာပါသလား?")) {
            remove(ref(db, `products/${gameId}/${prodId}`));
          }
        });
      });
    });
  }

  // 4. ADMIN ACTIONS (ဂိမ်းပစ္စည်းအသစ် တိုက်ရိုက်ထည့်ခြင်း)
  document.getElementById('btnAddProduct').addEventListener('click', () => {
    const name = document.getElementById('prodName').value;
    const price = document.getElementById('prodPrice').value;

    if(!name || !price) return alert("အချက်အလက် ဖြည့်စွက်ပါ");

    push(ref(db, `products/${gameId}`), {
      name: name,
      price: price
    }).then(() => {
      alert("ပစ္စည်းအသစ် ထည့်သွင်းပြီးပါပြီ။");
      document.getElementById('prodName').value = "";
      document.getElementById('prodPrice').value = "";
    });
  });
</script>

</body>
</html>
